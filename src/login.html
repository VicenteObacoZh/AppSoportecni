<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GpsRastreo | Acceso Operativo</title>
  <meta name="description" content="Pantalla de acceso demo para GpsRastreo." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body class="auth-body">
  <div class="auth-shell auth-shell--single">
    <section class="auth-panel">
      <div class="auth-panel__brand">
        <img src="../assets/icono.png" alt="GpsRastreo" class="auth-logo auth-logo--hero" />
        <h1 class="auth-panel__title">GpsRastreo</h1>
      </div>

      <div class="auth-panel__top">
        <div>
          <h2 class="auth-panel__subtitle">Inicio de Sesion</h2>
        </div>
      </div>

      <form class="auth-form" id="loginForm">
        <label class="field">
          <span>Correo electronico</span>
          <input type="email" name="email" placeholder="operaciones@gpsrastreo.com" autocomplete="username" />
        </label>
        <label class="field">
          <span>Contrasena</span>
          <input type="password" name="password" placeholder="********" autocomplete="current-password" />
        </label>
        <div class="auth-form__meta">
          <label class="checkbox">
            <input type="checkbox" id="rememberCredentials" checked />
            <span>Recordar este equipo</span>
          </label>
          <a class="text-link" href="https://rastreo.soportecni.com" target="_blank" rel="noreferrer">Ir a la plataforma real</a>
        </div>
        <button class="pill pill--primary auth-submit" type="submit">Entrar al dashboard</button>
        <p class="form-note" id="loginMessage">Ingresa con tu cuenta real del portal para crear la sesion del dashboard.</p>
        <div class="integration-banner" id="integrationBanner">
          El frontend usa siempre el backend proxy local. Si el backend esta en modo mock o live, la UI mantiene el mismo contrato.
        </div>
      </form>
    </section>
  </div>

  <script src="./config.js?v=3"></script>
  <script src="./mock-data.js?v=3"></script>
  <script src="./api.js?v=3"></script>
  <script src="./app-shell.js?v=1"></script>
  <script src="./runtime.js?v=3"></script>
</body>
</html>
