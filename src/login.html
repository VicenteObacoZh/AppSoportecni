<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GpsRastreo | Acceso operativo</title>
  <meta name="description" content="Pantalla de acceso operativo para GpsRastreo." />
  <style>
    html, body {
      margin: 0;
      min-height: 100%;
      background: #02060d;
      color: #eef6ff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
  </style>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body class="auth-body">
  <div class="auth-shell auth-shell--single">
    <section class="auth-panel">
      <div class="auth-panel__brand">
        <img src="../assets/icono.png" alt="GpsRastreo" class="auth-logo auth-logo--hero" />
        <h1 class="auth-panel__title">GpsRastreo</h1>
      </div>

      <div class="auth-panel__top">
        <div>
          <h2 class="auth-panel__subtitle">Rastreo Satelital</h2>
        </div>
      </div>

      <form class="auth-form" id="loginForm">
        <label class="field">
          <span>Usuario</span>
          <input type="email" name="email" placeholder="operaciones@gpsrastreo.com" autocomplete="username" />
        </label>
        <label class="field">
          <span>Contrasena</span>
          <input type="password" name="password" placeholder="********" autocomplete="current-password" />
        </label>
        <div class="auth-form__meta">
          <label class="checkbox">
            <input type="checkbox" id="rememberCredentials" checked />
            <span>Recordar acceso en este equipo</span>
          </label>
        </div>
        <button class="pill pill--primary auth-submit" type="submit">Ingresar</button>
        <p class="form-note" id="loginMessage" hidden></p>
        <div class="integration-banner" id="integrationBanner" aria-live="polite">
          GpsRastreo - Todos los derechos reservados.
        </div>
      </form>
    </section>
  </div>

  <script src="./config.js?v=3"></script>
  <script src="./mock-data.js?v=3"></script>
  <script src="./api.js?v=3"></script>
  <script src="./app-shell.js?v=1"></script>
  <script src="./runtime.js?v=4"></script>
</body>
</html>
