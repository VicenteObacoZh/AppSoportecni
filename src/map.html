<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GpsRastreo | Mapa en vivo</title>
  <meta name="description" content="Vista movil de mapa en vivo para GpsRastreo." />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body class="dashboard-body dashboard-body--map">
  <div class="mobile-map-app">
    <header class="mobile-map-topbar">
      <button class="mobile-map-topbar__back" type="button" id="mapBackButton" aria-label="Volver">&#8592;</button>
      <div class="mobile-map-topbar__title">
        <h1 id="mapHeaderTitle">Mapa</h1>
      </div>
      <div class="mobile-map-topbar__status" aria-hidden="true">&#128663;</div>
      <div class="mobile-map-counters">
        <span class="mobile-map-counter mobile-map-counter--green" id="mapMovingCount">0</span>
        <span class="mobile-map-counter mobile-map-counter--orange" id="mapLocationCount">0</span>
        <span class="mobile-map-counter mobile-map-counter--red" id="mapAlertCount">0</span>
      </div>
    </header>

    <main class="mobile-map-stage">
      <div id="pageLiveMap" class="mobile-map-canvas"></div>
      <div class="map-empty-state map-empty-state--overlay" id="pageMapEmptyState">
        Esperando unidades reales para pintar el mapa.
      </div>

      <button class="mobile-map-menu-button" type="button" id="mobileMapMenuButton" aria-label="Abrir panel lateral" aria-expanded="false">
        &#9776;
      </button>

      <div class="mobile-map-actions">
        <button type="button" class="mobile-map-action" id="mapLayerButton" title="Capas">&#128506;</button>
        <button type="button" class="mobile-map-action" id="mapAlertsButton" title="Alertas">&#128680;</button>
        <button type="button" class="mobile-map-action" id="refreshMapButton" title="Actualizar">&#8635;</button>
        <button type="button" class="mobile-map-action mobile-map-action--active" id="mapRoutesButton" title="Historial">&#10136;</button>
        <button type="button" class="mobile-map-action" id="mapZoomInButton" title="Acercar">+</button>
        <button type="button" class="mobile-map-action" id="mapZoomOutButton" title="Alejar">&#8722;</button>
        <button type="button" class="mobile-map-action" id="mapLocateButton" title="Centrar">&#8998;</button>
      </div>

      <section class="mobile-map-layer-panel" id="mapLayerPanel" hidden>
        <div class="mobile-map-layer-panel__section">
          <span class="mobile-map-layer-panel__label">Base map</span>
          <div class="mobile-map-layer-panel__chips" id="mapLayerChoices">
            <button type="button" class="mobile-map-layer-chip mobile-map-layer-chip--active" data-map-layer="osm">Clasico</button>
            <button type="button" class="mobile-map-layer-chip" data-map-layer="light">Claro</button>
            <button type="button" class="mobile-map-layer-chip" data-map-layer="terrain">Terreno</button>
          </div>
        </div>

        <div class="mobile-map-layer-panel__section">
          <span class="mobile-map-layer-panel__label">Estado</span>
          <div class="mobile-map-layer-panel__chips">
            <button type="button" class="mobile-map-layer-chip mobile-map-layer-chip--active" data-map-status="all">Todas</button>
            <button type="button" class="mobile-map-layer-chip" data-map-status="moving">Movimiento</button>
            <button type="button" class="mobile-map-layer-chip" data-map-status="idle">Reposo</button>
            <button type="button" class="mobile-map-layer-chip" data-map-status="stopped">Detenido</button>
            <button type="button" class="mobile-map-layer-chip" data-map-status="offline">Sin senal</button>
          </div>
        </div>

        <div class="mobile-map-layer-panel__section">
          <button type="button" class="mobile-map-layer-toggle" id="mapGeofencesToggle">Mostrar geocercas</button>
          <small id="mapGeofencesStatus">Geocercas aun no cargadas.</small>
        </div>
      </section>

      <aside class="mobile-map-sheet" id="mobileMapSheet">
        <div class="mobile-map-sheet__tabs">
          <button type="button" class="mobile-map-sheet__tab mobile-map-sheet__tab--active" data-sheet-tab="devices">Vehiculos</button>
          <button type="button" class="mobile-map-sheet__tab" data-sheet-tab="companies">Empresas</button>
        </div>

        <div class="mobile-map-sheet__search">
          <span class="mobile-map-sheet__search-icon">&#128269;</span>
          <input type="text" id="mapSearchInput" placeholder="Buscar" />
          <button type="button" id="mapSearchClearButton" aria-label="Limpiar busqueda">&#10005;</button>
        </div>

        <div class="mobile-map-sheet__panel mobile-map-sheet__panel--active" data-sheet-panel="devices">
          <div class="mobile-map-list" id="mapDeviceList"></div>
        </div>

        <div class="mobile-map-sheet__panel" data-sheet-panel="companies">
          <div class="mobile-map-company-list" id="mapCompanyList"></div>
        </div>
      </aside>

      <section class="mobile-map-event-panel" id="mapEventPanel" hidden>
        <div class="mobile-map-event-panel__top">
          <div>
            <p class="eyebrow">Evento</p>
            <h3 id="mapEventType">Sin evento</h3>
          </div>
          <button class="mobile-map-event-panel__address" type="button" id="mapEventAddressButton">Mostrar direccion</button>
        </div>
        <div class="mobile-map-event-panel__meta">
          <article>
            <span>Velocidad</span>
            <strong id="mapEventSpeed">0 kph</strong>
          </article>
          <article>
            <span>Fecha y hora</span>
            <strong id="mapEventTime">--</strong>
          </article>
        </div>
        <p class="mobile-map-event-panel__address-text" id="mapEventAddressText" hidden></p>
      </section>

      <section class="mobile-map-device-panel" id="mapDevicePanel" hidden>
        <div class="mobile-map-device-panel__top">
          <div>
            <p class="eyebrow">Unidad</p>
            <h3 id="mapDeviceTitle">Sin unidad</h3>
          </div>
          <button class="mobile-map-device-panel__action" type="button" id="mapDeviceHistoryButton">Historico</button>
        </div>
        <div class="mobile-map-device-panel__meta">
          <article>
            <span>Empresa</span>
            <strong id="mapDeviceCompany">-</strong>
          </article>
          <article>
            <span>Velocidad</span>
            <strong id="mapDeviceSpeed">0 kph</strong>
          </article>
          <article>
            <span>Ultima posicion</span>
            <strong id="mapDeviceTime">--</strong>
          </article>
          <article>
            <span>IMEI</span>
            <strong id="mapDeviceUniqueId">-</strong>
          </article>
        </div>
        <div class="mobile-map-device-panel__footer">
          <span class="mobile-map-device-panel__status" id="mapDeviceStatus">Sin estado</span>
          <button class="mobile-map-device-panel__address" type="button" id="mapDeviceAddressButton">Mostrar direccion</button>
        </div>
        <p class="mobile-map-device-panel__address-text" id="mapDeviceAddressText" hidden></p>
      </section>
    </main>

    <nav class="mobile-bottom-nav">
      <a class="mobile-bottom-nav__item" href="./devices.html">
        <span class="mobile-bottom-nav__icon">&#128663;</span>
        <span>Dispositivos</span>
      </a>
      <a class="mobile-bottom-nav__item" href="./alerts.html">
        <span class="mobile-bottom-nav__icon">&#128276;</span>
        <span>Eventos</span>
      </a>
      <a class="mobile-bottom-nav__item mobile-bottom-nav__item--active" href="./map.html">
        <span class="mobile-bottom-nav__icon">&#128506;</span>
        <span>Mapa</span>
      </a>
      <a class="mobile-bottom-nav__item" href="./settings.html">
        <span class="mobile-bottom-nav__icon">&#128736;</span>
        <span>Configuraciones</span>
      </a>
    </nav>
  </div>

  <script src="./config.js?v=3"></script>
  <script src="./mock-data.js?v=3"></script>
  <script src="./api.js?v=3"></script>
  <script src="./app-shell.js?v=1"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="./map.js?v=5"></script>
</body>
</html>
