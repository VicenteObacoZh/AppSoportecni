<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GpsRastreo | Alertas</title>
  <meta name="description" content="Vista movil de alertas configuradas para GpsRastreo." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css?v=29" />
</head>
<body class="dashboard-body dashboard-body--events-mobile">
  <div class="mobile-events-app">
    <header class="mobile-events-topbar mobile-events-topbar--settings">
      <button class="mobile-events-back" id="alertsBackButton" type="button" aria-label="Volver">&#8592;</button>
      <div>
        <h1>Alertas</h1>
      </div>
      <button class="mobile-events-refresh" id="refreshAlertsButton" type="button" aria-label="Actualizar alertas">&#8635;</button>
    </header>

    <main class="mobile-events-main">
      <section class="mobile-events-summary" id="alertsSummary"></section>

      <label class="mobile-events-search">
        <span class="mobile-events-search__icon">&#128269;</span>
        <input type="text" id="alertsSearch" placeholder="Buscar alerta" />
      </label>

      <label class="mobile-events-type-filter">
        <span>Tipo</span>
        <select id="alertsTypeFilter">
          <option value="all">Todos</option>
          <option value="active">Activas</option>
          <option value="inactive">Inactivas</option>
        </select>
      </label>

      <section class="mobile-alert-config-list" id="alertsEventsList">
        <div class="mobile-map-empty">Cargando alertas...</div>
      </section>
    </main>

    <nav class="mobile-bottom-nav">
      <a class="mobile-bottom-nav__item" href="./devices.html" aria-label="Dispositivos">
        <span class="mobile-bottom-nav__icon"><img class="mobile-bottom-nav__icon-img" src="./assets/device-actions/DeviceInf.png" alt="" /></span>
        <span>Dispositivos</span>
      </a>
      <a class="mobile-bottom-nav__item mobile-bottom-nav__item--active" href="./alerts.html" aria-label="Alertas">
        <span class="mobile-bottom-nav__icon">&#128276;</span>
        <span>Alertas</span>
      </a>
      <a class="mobile-bottom-nav__item" href="./map.html" aria-label="Mapa">
        <span class="mobile-bottom-nav__icon">&#128506;</span>
        <span>Mapa</span>
      </a>
      <a class="mobile-bottom-nav__item" href="./settings.html" aria-label="Configuraciones">
        <span class="mobile-bottom-nav__icon">&#128736;</span>
        <span>Configuraciones</span>
      </a>
    </nav>
  </div>

  <script src="./config.js?v=6"></script>
  <script src="./mock-data.js?v=5"></script>
  <script src="./api.js?v=5"></script>
  <script src="./app-shell.js?v=1"></script>
  <script src="./alerts.js?v=5"></script>
</body>
</html>
