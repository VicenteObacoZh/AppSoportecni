<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GpsRastreo | Eventos recientes</title>
  <meta name="description" content="Vista movil de eventos recientes para GpsRastreo." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body class="dashboard-body dashboard-body--events-mobile">
  <div class="mobile-events-app">
    <header class="mobile-events-topbar">
      <div>
        <p class="eyebrow">Operacion</p>
        <h1>Eventos recientes</h1>
      </div>
      <button class="mobile-events-refresh" id="refreshAlertsButton" type="button" aria-label="Actualizar eventos">&#8635;</button>
    </header>

    <section class="mobile-events-session">
      <strong id="alertsSessionTitle">Validando sesion...</strong>
      <span id="alertsSessionText">Preparando acceso al historial reciente del monitor.</span>
    </section>

    <main class="mobile-events-main">
      <section class="mobile-events-summary" id="alertsSummary"></section>

      <label class="mobile-events-search">
        <span class="mobile-events-search__icon">&#128269;</span>
        <input type="text" id="alertsSearch" placeholder="Buscar vehiculo o evento" />
      </label>

      <label class="mobile-events-type-filter">
        <span>Tipo</span>
        <select id="alertsTypeFilter">
          <option value="all">Todos</option>
        </select>
      </label>

      <section class="mobile-events-list" id="alertsEventsList">
        <div class="mobile-map-empty">Cargando eventos recientes...</div>
      </section>
    </main>

    <nav class="mobile-bottom-nav mobile-bottom-nav--icons-only">
      <a class="mobile-bottom-nav__item" href="./devices.html" aria-label="Dispositivos">
        <span class="mobile-bottom-nav__icon">&#128663;</span>
        <span>Dispositivos</span>
      </a>
      <a class="mobile-bottom-nav__item mobile-bottom-nav__item--active" href="./alerts.html" aria-label="Eventos">
        <span class="mobile-bottom-nav__icon">&#128276;</span>
        <span>Eventos</span>
      </a>
      <a class="mobile-bottom-nav__item" href="./map.html" aria-label="Mapa">
        <span class="mobile-bottom-nav__icon">&#128506;</span>
        <span>Mapa</span>
      </a>
      <a class="mobile-bottom-nav__item" href="./routes.html" aria-label="Historico">
        <span class="mobile-bottom-nav__icon">&#128736;</span>
        <span>Historico</span>
      </a>
    </nav>
  </div>

  <script src="./config.js?v=4"></script>
  <script src="./mock-data.js?v=4"></script>
  <script src="./api.js?v=4"></script>
  <script src="./app-shell.js?v=1"></script>
  <script src="./alerts.js?v=4"></script>
</body>
</html>
