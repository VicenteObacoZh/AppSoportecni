<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GpsRastreo | Reproduccion de historial</title>
  <meta name="description" content="Vista movil de reproduccion de historial para GpsRastreo." />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css?v=29" />
  <link rel="stylesheet" href="./routes-datepicker-fix.css?v=1" />
</head>
<body class="dashboard-body dashboard-body--routes-mobile dashboard-body--history-player">
  <div class="mobile-routes-player">
    <header class="mobile-routes-player__header">
      <button type="button" class="mobile-routes-player__icon-btn" id="routeBackButton" aria-label="Volver">
        <span aria-hidden="true">&#8592;</span>
      </button>

      <div class="mobile-routes-player__title">
        <h1 id="routeDeviceTitle">Reproduccion</h1>
      </div>

      <div class="mobile-routes-player__actions">
        <button type="button" class="mobile-routes-player__icon-btn" id="routeFiltersButton" aria-label="Cambiar rango">
          <span aria-hidden="true">&#128196;</span>
        </button>
        <button type="button" class="mobile-routes-player__icon-btn" id="loadRouteButton" aria-label="Consultar historial">
          <span aria-hidden="true">&#9201;</span>
        </button>
      </div>
    </header>

    <main class="mobile-routes-player__main">
      <section class="mobile-routes-player__map-stage">
        <div id="routeMap" class="mobile-routes-player__map"></div>
        <div class="map-empty-state map-empty-state--overlay" id="routeMapEmptyState">
          <div class="loading-indicator loading-indicator--overlay" aria-label="Procesando">
            <div class="loading-indicator__spinner" aria-hidden="true"></div>
          </div>
        </div>

        <aside class="mobile-routes-player__sheet">
          <div class="mobile-routes-player__grabber"></div>

          <section class="mobile-routes-player__playback">
            <div class="mobile-routes-player__playback-top">
              <button type="button" class="mobile-routes-player__play-btn" id="routePlayButton" aria-label="Reproducir">
                <span aria-hidden="true">&#10074;&#10074;</span>
              </button>
              <input type="range" id="routePlaybackSlider" min="0" max="0" value="0" step="1" />
            </div>

            <div class="mobile-routes-player__status-line">
              <span aria-hidden="true">&#128338;</span>
              <strong>Ultima actualizacion:</strong>
              <span id="routeCurrentTime">--</span>
            </div>

            <div class="mobile-routes-player__status-line">
              <span aria-hidden="true">&#128663;</span>
              <strong>Velocidad:</strong>
              <span id="routeCurrentSpeed">0 km/h</span>
            </div>

            <div class="mobile-routes-player__summary" id="routeSummary"></div>
          </section>

          <section class="mobile-routes-player__timeline">
            <div class="mobile-routes-player__timeline-head">
              <strong>Eventos del recorrido</strong>
              <span id="routeTimelineCount">Sin puntos cargados</span>
            </div>
            <div class="mobile-routes-player__points" id="routePointsList"></div>
          </section>
        </aside>
      </section>
    </main>
  </div>

  <div class="mobile-routes-player__hidden-controls" aria-hidden="true">
    <div id="routePlaybackState">Carga una ruta para iniciar</div>
    <span id="routeSignalPill">Rango listo</span>
    <select id="routeSpeedSelect">
      <option value="0.5">0.5x</option>
      <option value="1" selected>1x</option>
      <option value="2">2x</option>
      <option value="4">4x</option>
    </select>
  </div>

  <div class="mobile-routes-filter-modal" id="routeFiltersPanel" hidden>
    <div class="mobile-routes-filter-modal__backdrop" id="routeFiltersBackdrop"></div>
    <div class="mobile-routes-filter-modal__card">
      <div class="mobile-routes-filter-modal__head">
        <h3>Seleccionar rango</h3>
        <button type="button" id="routeCloseFiltersButton" aria-label="Cerrar">&#10005;</button>
      </div>

      <div class="mobile-routes-filter-modal__body">
        <label class="field">
          <span>Dispositivo</span>
          <select id="routeDeviceSelect"></select>
        </label>

        <div class="mobile-routes-player__preset-grid">
          <button type="button" class="mobile-routes-player__preset" data-route-preset="1h">Ultima 1h</button>
          <button type="button" class="mobile-routes-player__preset" data-route-preset="4h">Ultimas 4h</button>
          <button type="button" class="mobile-routes-player__preset" data-route-preset="today">Hoy</button>
          <button type="button" class="mobile-routes-player__preset" data-route-preset="yesterday">Ayer</button>
        </div>

        <div class="mobile-routes-player__date-grid">
          <label class="field">
            <span>Desde</span>
            <input type="text" id="routeFrom" readonly inputmode="none" autocomplete="off" />
          </label>

          <label class="field">
            <span>Hasta</span>
            <input type="text" id="routeTo" readonly inputmode="none" autocomplete="off" />
          </label>
        </div>
      </div>

      <div class="mobile-routes-filter-modal__footer">
        <button type="button" id="routeApplyFiltersButton">Aceptar</button>
      </div>
    </div>
  </div>

  <script src="./config.js?v=6"></script>
  <script src="./mock-data.js?v=3"></script>
  <script src="./api.js?v=3"></script>
  <script src="./app-shell.js?v=1"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="./routes-datepicker-fix.js?v=1"></script>
  <script src="./routes.js?v=5"></script>
</body>
</html>
